@keyframes shake {
  0%   { transform: translate(0, 0) rotate(0deg); }
  5%   { transform: translate(-12px, -12px) rotate(-3deg); }
  10%  { transform: translate(12px, -12px) rotate(3deg); }
  15%  { transform: translate(-12px, 12px) rotate(-4deg); }
  20%  { transform: translate(12px, 12px) rotate(4deg); }
  25%  { transform: translate(-14px, -10px) rotate(-3deg); }
  30%  { transform: translate(14px, -10px) rotate(3deg); }
  35%  { transform: translate(-14px, 10px) rotate(-4deg); }
  40%  { transform: translate(14px, 10px) rotate(4deg); }
  45%  { transform: translate(-10px, -14px) rotate(-3deg); }
  50%  { transform: translate(10px, -14px) rotate(3deg); }
  55%  { transform: translate(-10px, 14px) rotate(-4deg); }
  60%  { transform: translate(10px, 14px) rotate(4deg); }
  65%  { transform: translate(-12px, -12px) rotate(-3deg); }
  70%  { transform: translate(12px, -12px) rotate(3deg); }
  75%  { transform: translate(-12px, 12px) rotate(-4deg); }
  80%  { transform: translate(12px, 12px) rotate(4deg); }
  90%  { transform: translate(-8px, -8px) rotate(-2deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

<!-- SIGNUP -->
  
<script>
  function signup() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
      .catch(err => alert(err.message));
  }

  function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
      .catch(err => alert(err.message));
  }

  function logout() {
    auth.signOut();
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("userBox").style.display = "block";
      document.getElementById("userEmail").textContent = "Logged in as: " + user.email;
    } else {
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("userBox").style.display = "none";
    }
  });
</script>
