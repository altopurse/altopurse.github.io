<!DOCTYPE html>
<html lang="en">
<head>
  <title>Support Our Gambling Addiction</title>

  <!-- Ensures the page scales correctly on phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Reset default spacing and ensure full height */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      /* Your background image */
      background-image: url('background-replacer-result (1).png');

      /* Shows the ENTIRE image on all devices (no cropping) */
      background-size: contain;

      /* Keeps the image centered */
      background-position: center center;

      /* Prevents tiling */
      background-repeat: no-repeat;

      /* Fills empty space around the image (important for phones) */
      background-color: black;

      /* Centers your donation box */
      display: flex;
      justify-content: center;
      align-items: center;

      /* Text styling */
      text-align: center;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 2px 2px 5px black;
    }

    .box {
      /* Transparent dark background so text is readable */
      background: rgba(0,0,0,0.55);

      /* Spacing and rounded corners */
      padding: 20px;
      border-radius: 12px;

      /* Makes it fit nicely on mobile */
      width: 90%;
      max-width: 600px;
      box-sizing: border-box;
    }

    /* PayPal link styling */
    a {
      color: #00aaff;
      font-weight: bold;
    }

    /* Stripe button styling */
    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #635bff;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="box">
    <!-- Main title -->
    <h1>Support Our Gambling Addiction</h1>

    <!-- Description text -->
    <p>If you'd like to support what we do, you can donate here:</p>

    <!-- PayPal donation link -->
