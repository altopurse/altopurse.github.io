<!DOCTYPE html>
<html lang="en">
<head>
  <title>Support Our Gambling Addiction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Background wrapper that centers the image */
    .bg-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      background-color: black;
      z-index: -1;
    }

    .bg-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Center the box */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;

      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 2px 2px 5px black;
    }

    .box {
      background: rgba(0,0,0,0.55);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-sizing: border-box;
    }

    a {
      color: #00aaff;
      font-weight: bold;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #635bff;
      color: white;
      margin-top: 20px;
    }

    /* Corner GIFs */
    .corner {
      position: fixed;
      width: 80px;
      height: auto;
      z-index: 10;
    }

    .top-left    { top: 10px; left: 10px; }
    .top-right   { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right{ bottom: 10px; right: 10px; }
  </style>
</head>

<body>

  <!-- Background image -->
  <div class="bg-wrapper">
    <img src="background-replacer-result (1).png" alt="">
  </div>

  <!-- Donation box -->
