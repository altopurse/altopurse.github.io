<!DOCTYPE html>
<html lang="en">
<head>
  <title>Support Our Gambling Addiction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* prevents weird jumps on mobile */
    }

    /* Background wrapper that centers the image properly */
    .bg-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;   /* center horizontally */
      align-items: center;       /* center vertically */

      background-color: black;
      z-index: -1; /* behind everything */
    }

    /* The actual image */
    .bg-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* show full image */
    }

    /* Content box */
    .box {
      position: relative;
      z-index: 10;

      background: rgba(0,0,0,0.55);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      margin: auto;

      text-align: center;
      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 2px 2px 5px black;
    }

    a {
      color: #00aaff;
      font-weight: bold;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #635bff;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Background image centered perfectly on all devices -->
  <div class="bg-wrapper">
    <img src="background-replacer-result (1).png" alt="">
  </div>

  <!-- Your donation box -->
  <div class="box">
    <h1>Support Our Gambling Addiction</h1>
    <p>If you'd like to support what we do, you can donate here:</p>

    <p><a href="https://paypal.me/josegirard2000">Donate via PayPal</a></p>

    <button id="stripeButton">Donate with Stripe (£5)</button>
  </div>

  <script>
    document.getElementById("stripeButton").addEventListener("click", function () {
      window.location.href = "https://buy.stripe.com/7sY9AM4rS8tjbTce1ma3u00";
    });
  </script>

</body>
</html>
