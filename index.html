<!DOCTYPE html>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    /* Background wrapper that centers the image */
    .bg-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;   /* center horizontally */
      align-items: center;       /* center vertically */

      background-color: black;
      z-index: -1; /* behind everything */
    }

    .bg-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* show full image */
    }

    /* Center the box on ALL devices */
    body {
      display: flex;
      justify-content: center;   /* center vertically */
      align-items: center;       /* center horizontally */
      min-height: 100vh;
      text-align: center;

      font-family: Arial, sans-serif;
      color: white;
      text-shadow: 2px 2px 5px black;
    }

    .box {
      background: rgba(0,0,0,0.55);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-sizing: border-box;
    }

    a {
      color: #00aaff;
      font-weight: bold;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #635bff;
      color: white;
      margin-top: 20px;
    }

    /* --- SLOT MACHINE GIFS IN CORNERS --- */
    .corner {
      position: fixed;
      width: 80px;      /* small/medium size */
      height: auto;
      z-index: 10;
    }

    .top-left    { top: 10px; left: 10px; }
    .top-right   { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right{ bottom: 10px; right: 10px; }
  </style>
