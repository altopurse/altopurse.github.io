<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up — JobLeadHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="navbar.js"></script>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">JobLeadHub</div>
    <nav class="nav-links" id="nav-auth"></nav>
    <div class="menu-toggle" id="menuToggle">☰</div>
  </header>

  <main>
    <div class="card auth-card">
      <h2>Create your account</h2>

      <form id="signupForm" novalidate>
        <label>
          Full Name / Username
          <input type="text" id="username" placeholder="e.g. Dave Plumbing" required />
        </label>
        <label>
          Email
          <input type="email" id="email" placeholder="you@example.com" required />
        </label>
        <label>
          Password
          <input type="password" id="password" placeholder="Min. 6 characters" required />
        </label>
        <label>
          Phone Number
          <input type="tel" id="phone" placeholder="+44 7700 000000" required />
        </label>
        <label>
          Trade / Profession
          <select id="trade">
            <option value="">Select your trade (optional)</option>
            <option value="plumber">Plumber</option>
            <option value="electrician">Electrician</option>
            <option value="builder">Builder</option>
            <option value="landscaper">Landscaper</option>
            <option value="cleaner">Cleaner</option>
            <option value="other">Other</option>
          </select>
        </label>
        <button type="submit">Create Account</button>
        <p class="msg" id="msg" aria-live="polite"></p>
      </form>

      <p class="hint" style="margin-top:16px;">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, setDoc }                    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const auth = window.firebaseAuth;
    const db   = window.firebaseDB;
    const msg  = document.getElementById("msg");

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const phone    = document.getElementById("phone").value.trim();
      const trade    = document.getElementById("trade").value;

      if (!username || !email || !password || !phone) {
        msg.textContent = "Please fill in all required fields.";
        msg.className   = "msg err";
        return;
      }
      if (password.length < 6) {
        msg.textContent = "Password must be at least 6 characters.";
        msg.className   = "msg err";
        return;
      }

      msg.textContent = "Creating account…";
      msg.className   = "msg";

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, "users", cred.user.uid), {
          username, email, phone, trade,
          credits:   0,
          createdAt: new Date(),
        });
        msg.textContent = "Account created! Redirecting…";
        msg.className   = "msg ok";
        setTimeout(() => window.location.href = "index.html", 1000);
      } catch (err) {
        msg.textContent = friendlyError(err.code);
        msg.className   = "msg err";
      }
    });

    function friendlyError(code) {
      switch (code) {
        case "auth/email-already-in-use":
          return "That email is already registered. Try logging in.";
        case "auth/invalid-email":
          return "Please enter a valid email address.";
        case "auth/weak-password":
          return "Password is too weak. Use at least 6 characters.";
        default:
          return "Sign up failed. Please try again.";
      }
    }
  </script>

</body>
</html>
