<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up – AltoPurse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />

  <!-- 1️⃣ Firebase SIEMPRE VA PRIMERO -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { getFunctions } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-functions.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbC2njj5kAfv_Vn-q8bMJBVofvBTFTtuk",
      authDomain: "backend-for-my-web.firebaseapp.com",
      projectId: "backend-for-my-web",
      storageBucket: "backend-for-my-web.firebasestorage.app",
      messagingSenderId: "401686560458",
      appId: "1:401686560458:web:9182e39977b60e97547e33"
    };

    const app = initializeApp(firebaseConfig);

    window.firebaseAuth = getAuth(app);
    window.firebaseDB = getFirestore(app);
    window.firebaseFunctions = getFunctions(app);
  </script>

  <!-- 2️⃣ navbar.js DESPUÉS de Firebase -->
  <script type="module" src="navbar.js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">AltoPurse</div>
    <nav class="nav-links" id="nav-auth"></nav>
    <div class="menu-toggle" id="menuToggle">☰</div>
  </header>

  <main>
    <div class="card">
      <h2>Crear cuenta</h2>

      <form id="signupForm">
        <label>
          Nombre de usuario
          <input type="text" id="username" required />
        </label>

        <label>
          Email
          <input type="email" id="email" required />
        </label>

        <label>
          Contraseña
          <input type="password" id="password" required />
        </label>

        <label>
          Número de teléfono
          <input type="tel" id="phone" required />
        </label>

        <button type="submit">Crear cuenta</button>
        <p class="msg" id="msg"></p>
      </form>

      <p class="hint">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
      </p>
    </div>
  </main>

  <!-- 3️⃣ SIGNUP LOGIC (usa la MISMA instancia global de Firebase) -->
  <script type="module">
    import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const auth = window.firebaseAuth;
    const db = window.firebaseDB;

    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const phone = document.getElementById("phone").value.trim();

      msg.textContent = "Creando cuenta...";
      msg.className = "msg";

      try {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCred.user.uid;

        await setDoc(doc(db, "users", uid), {
          username,
          email,
          phone,
          credits: 0,
          createdAt: new Date()
        });

        msg.textContent = "Cuenta creada correctamente";
        msg.className = "msg ok";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);

      } catch (err) {
        msg.textContent = "Error: " + err.message;
        msg.className = "msg err";
      }
    });
  </script>

</body>
</html>
