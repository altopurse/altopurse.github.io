<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Buy Credits — JobLeadHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="navbar.js"></script>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">JobLeadHub</div>
    <nav class="nav-links" id="nav-auth"></nav>
    <div class="menu-toggle" id="menuToggle">☰</div>
  </header>

  <main>
    <div style="max-width:600px; margin:auto; padding:20px;">
      <h2 style="margin-bottom:8px;">Buy Credits</h2>
      <p class="hint" style="margin-bottom:20px;">
        Credits let you unlock leads and contact customers directly.
        Payments are processed securely via Mollie.
      </p>

      <div class="card" style="display:flex; flex-direction:column; gap:14px;">

        <button class="credit-btn" data-credits="10" data-amount="500" data-label="10 Credits — £5">
           10 Credits — £5
          <span class="credit-sub">Great for testing the platform</span>
        </button>

        <button class="credit-btn" data-credits="25" data-amount="1000" data-label="25 Credits — £10">
           25 Credits — £10
          <span class="credit-sub">Most popular</span>
        </button>

        <button class="credit-btn" data-credits="50" data-amount="2000" data-label="50 Credits — £20">
           50 Credits — £20
          <span class="credit-sub">For active tradespeople</span>
        </button>

        <button class="credit-btn" data-credits="100" data-amount="3500" data-label="100 Credits — £35">
           100 Credits — £35
          <span class="credit-sub">Best value — save £15</span>
        </button>

      </div>

      <p class="msg" id="msg" style="margin-top:16px;" aria-live="polite"></p>

      <p class="hint" style="margin-top:12px; text-align:center;">
        Secure payments powered by <strong>Mollie</strong>. No card details stored.
      </p>
    </div>
  </main>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const auth    = window.firebaseAuth;
    const msg     = document.getElementById("msg");
    const buttons = document.querySelectorAll(".credit-btn");

    // ── YOUR EXPRESS BACKEND URL ──────────────────────────────────
    // Change this to your deployed server URL once live.
    // For local testing use: http://localhost:3000
    const BACKEND_URL = "https://jobleadhub-server.onrender.com";
    // ─────────────────────────────────────────────────────────────

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        msg.textContent = "You must be logged in to buy credits.";
        msg.className   = "msg err";
        buttons.forEach(btn => btn.disabled = true);
      } else {
        currentUser = user;
      }
    });

    buttons.forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!currentUser) return;

        const credits = Number(btn.dataset.credits);
        const amount  = Number(btn.dataset.amount);   // in pence (e.g. 500 = £5.00)
        const label   = btn.dataset.label;

        buttons.forEach(b => b.disabled = true);
        msg.textContent = "Creating payment session…";
        msg.className   = "msg";

        try {
          // Get a fresh Firebase ID token to authenticate the request
          const idToken = await currentUser.getIdToken();

          const res = await fetch(`${BACKEND_URL}/create-payment`, {
            method:  "POST",
            headers: {
              "Content-Type":  "application/json",
              "Authorization": `Bearer ${idToken}`,
            },
            body: JSON.stringify({ credits, amount, description: label }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `Server error ${res.status}`);
          }

          const { checkoutUrl } = await res.json();
          msg.textContent = "Redirecting to payment…";
          msg.className   = "msg ok";
          window.location.href = checkoutUrl;

        } catch (err) {
          console.error("Payment error:", err);
          msg.textContent = "Error: " + err.message;
          msg.className   = "msg err";
          buttons.forEach(b => b.disabled = false);
        }
      });
    });
  </script>

</body>
</html>
