<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log In — JobLeadHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="firebase-init.js"></script>
  <script type="module" src="navbar.js"></script>
</head>
<body>

  <header class="navbar">
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">JobLeadHub</div>
    <nav class="nav-links" id="nav-auth"></nav>
    <div class="menu-toggle" id="menuToggle">☰</div>
  </header>

  <main>
    <div class="card auth-card">
      <h2>Log in to your account</h2>

      <form id="loginForm" novalidate>
        <label>
          Email
          <input type="email" id="email" placeholder="you@example.com" required />
        </label>
        <label>
          Password
          <input type="password" id="password" placeholder="••••••••" required />
        </label>
        <button type="submit">Log In</button>
        <p class="msg" id="msg" aria-live="polite"></p>
      </form>

      <p class="hint" style="margin-top:16px;">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const auth = window.firebaseAuth;
    const msg  = document.getElementById("msg");

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      msg.textContent = "Signing in…";
      msg.className   = "msg";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        msg.textContent = "Signed in! Redirecting…";
        msg.className   = "msg ok";
        setTimeout(() => window.location.href = "index.html", 800);
      } catch (err) {
        msg.textContent = friendlyError(err.code);
        msg.className   = "msg err";
      }
    });

    function friendlyError(code) {
      switch (code) {
        case "auth/user-not-found":
        case "auth/wrong-password":
        case "auth/invalid-credential":
          return "Incorrect email or password.";
        case "auth/too-many-requests":
          return "Too many attempts. Please try again later.";
        default:
          return "Sign in failed. Please try again.";
      }
    }
  </script>

</body>
</html>
