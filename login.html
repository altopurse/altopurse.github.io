<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – AltoPurse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />

  <!-- 1️⃣ Firebase SIEMPRE VA PRIMERO -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { getFunctions } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-functions.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbC2njj5kAfv_Vn-q8bMJBVofvBTFTtuk",
      authDomain: "backend-for-my-web.firebaseapp.com",
      projectId: "backend-for-my-web",
      storageBucket: "backend-for-my-web.firebasestorage.app",
      messagingSenderId: "401686560458",
      appId: "1:401686560458:web:9182e39977b60e97547e33"
    };

    const app = initializeApp(firebaseConfig);

    window.firebaseAuth = getAuth(app);
    window.firebaseDB = getFirestore(app);
    window.firebaseFunctions = getFunctions(app);
  </script>

  <!-- 2️⃣ navbar.js DESPUÉS de Firebase -->
  <script type="module" src="navbar.js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">LeadsFinder</div>
    <nav class="nav-links" id="nav-auth"></nav>
    <div class="menu-toggle" id="menuToggle">☰</div>
  </header>

  <main>
    <div class="card">
      <h2>Iniciar sesión</h2>

      <form id="loginForm">
        <label>
          Email
          <input type="email" id="email" required />
        </label>

        <label>
          Contraseña
          <input type="password" id="password" required />
        </label>

        <button type="submit">Entrar</button>
        <p class="msg" id="msg"></p>
      </form>

      <p class="hint">
        ¿No tienes cuenta? <a href="signup.html">Crear cuenta</a>
      </p>
    </div>
  </main>

  <!-- 3️⃣ LOGIN LOGIC (usa la MISMA instancia global de Firebase) -->
  <script type="module">
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

    const auth = window.firebaseAuth;
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      msg.textContent = "Iniciando sesión...";
      msg.className = "msg";

      try {
        await signInWithEmailAndPassword(auth, email, password);

        msg.textContent = "Sesión iniciada";
        msg.className = "msg ok";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);

      } catch (err) {
        msg.textContent = "Error: " + err.message;
        msg.className = "msg err";
      }
    });
  </script>

</body>
</html>
